<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Play — Build &amp; Share Voxel Art in Your Browser</title>
    <meta
      name="description"
      content="Create blocky 3D voxel art right in your browser — no login. Build, remix, and share your creations in a community gallery. A free, MagicaVoxel-style voxel editor."
    />
    <meta name="keywords" content="voxel editor, voxel art, 3D pixel art, MagicaVoxel, browser voxel maker, no login, free 3D editor" />
    <meta name="theme-color" content="#eef0f4" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Voxel Play" />
    <meta property="og:title" content="Voxel Play — Build &amp; Share Voxel Art in Your Browser" />
    <meta property="og:description" content="Create blocky 3D voxel art in your browser — no login. Build, remix, and share in a community gallery." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Voxel Play — Build &amp; Share Voxel Art in Your Browser" />
    <meta name="twitter:description" content="Create blocky 3D voxel art in your browser — no login. Build, remix, and share in a community gallery." />
    <meta name="twitter:image" content="/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Voxel Play",
        "description": "Create blocky 3D voxel art in your browser — no login. Build, remix, and share your creations in a community gallery.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web browser",
        "browserRequirements": "Requires WebGL",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="app" class="mode-home">
      <div id="stage" class="stage">
        <canvas id="viewport"></canvas>
        <div id="ui"></div>
      </div>
      <div id="gallery-mount"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
